name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'artifacts/mobile/**'
      - 'patches/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies (applies pnpm patches)
        run: pnpm install --frozen-lockfile

      - name: Expo prebuild (generate native android folder)
        working-directory: artifacts/mobile
        env:
          EXPO_PUBLIC_API_URL: https://loh-parkir.replit.app/api
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make gradlew executable
        working-directory: artifacts/mobile/android
        run: chmod +x ./gradlew

      - name: Build release APK
        working-directory: artifacts/mobile/android
        env:
          EXPO_PUBLIC_API_URL: https://loh-parkir.replit.app/api
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lohparkir-apk
          path: artifacts/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
